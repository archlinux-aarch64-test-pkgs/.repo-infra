name: Build Container Image

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      rootfs_date:
        description: 'rootfs date (YYYY.MM.DD), leave empty to auto-detect'
        required: false
        type: string
  # Uncomment after self-hosted runner is configured:
  # push:
  #   paths:
  #     - 'Containerfile'
  #     - 'config/pacman.conf'
  #     - 'config/makepkg.conf'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: archlinux-aarch64-test-pkgs/build-env
  ROOTFS_BASE_URL: https://arch-linux-repo.drzee.net/arch/tarballs/os/aarch64

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout .repo-infra
        uses: actions/checkout@v4

      - name: Determine rootfs date
        id: rootfs
        run: |
          if [[ -n "${{ inputs.rootfs_date }}" ]]; then
            DATE="${{ inputs.rootfs_date }}"
          else
            DATE=$(curl -sL "$ROOTFS_BASE_URL/" | \
              grep -oP 'archlinux-bootstrap-\K[0-9]{4}\.[0-9]{2}\.[0-9]{2}' | \
              sort -V | tail -1)
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "::notice::Using rootfs date: $DATE"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          build-args: |
            ROOTFS_DATE=${{ steps.rootfs.outputs.date }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
