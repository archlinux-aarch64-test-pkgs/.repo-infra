name: Detect Package Updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .repo-infra
        uses: actions/checkout@v4

      - name: Check for updates and trigger builds
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
        run: bash scripts/detect-updates.sh
