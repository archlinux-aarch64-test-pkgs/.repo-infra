name: Scan New Packages

on:
  workflow_dispatch:

env:
  ORG: archlinux-aarch64-test-pkgs

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .repo-infra
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Scan for new pkg-* repos
        id: scan
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
        run: bash scripts/scan-new-packages.sh

      - name: Commit and push changes
        if: steps.scan.outputs.added > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/packages.json
          git diff --cached --quiet && exit 0
          git pull --rebase
          git commit -m "chore: register ${{ steps.scan.outputs.added }} new package(s)"
          git push

      - name: Trigger detect-updates
        if: steps.scan.outputs.added > 0
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
        run: gh workflow run detect-updates.yml
